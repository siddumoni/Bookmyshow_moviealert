name: booking-watch

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: booking-watch
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poller
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python poller.py

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "booking-watch-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update booking-watch state [skip ci]"
            git push
          else
            echo "No state change."
          fi
